<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page not found</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
        }

        .box {
            max-width: 520px;
            padding: 24px;
        }

        h1 {
            font-size: 72px;
            margin: 0 0 16px;
        }

        p {
            font-size: 18px;
            color: #ccc;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 10px 18px;
            border-radius: 8px;
        }

        a:hover {
            background: #fff;
            color: #111;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Back to Home</a>
</div>
</body>
</html>
